<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מנהל הזמן של אביב</title>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
    <style>
        #calendar {
            max-width: 900px;
            margin: 20px auto;
            padding: 10px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans p-4">

    <div class="max-w-md mx-auto bg-white rounded-2xl shadow-lg overflow-hidden mt-10 p-6 border border-gray-200">
        <h1 class="text-2xl font-bold text-center text-indigo-600 mb-6">היומן החכם שלי 🗓️</h1>

        <div style="text-align: center; margin-bottom: 24px;">
            <button onclick="loginToGoogle()" class="w-full bg-blue-500 text-white px-5 py-3 rounded-xl font-medium hover:bg-blue-600 transition shadow-md">
                התחבר עם Google Calendar 🔗
            </button>
        </div>

        <div class="mb-8 flex gap-2">
            <input type="text" id="taskTitle" placeholder="כתוב חופשי (למשל: ללמוד אלגוריתמים מחר)" 
                   class="border border-gray-300 rounded-lg px-4 py-2 w-full focus:outline-none focus:ring-2 focus:ring-indigo-500 transition">
            <button onclick="addTask()" 
                    class="bg-indigo-600 text-white px-5 py-2 rounded-lg font-medium hover:bg-indigo-700 transition min-w-[80px]">
                הוסף
            </button>
        </div>

        <div id='calendar'></div>

        <h2 class="text-lg font-semibold text-gray-700 mt-8 mb-4">משימות שממתינות לשיבוץ:</h2>
        <div id="tasksList" class="space-y-3 mb-6">
            <p class="text-gray-400 text-center text-sm">טוען משימות...</p>
        </div>

        <button onclick="syncToGoogle()" 
                class="w-full mt-2 bg-green-500 text-white px-5 py-3 rounded-xl font-medium hover:bg-green-600 transition flex justify-center items-center gap-2 shadow-md">
            <span>✅</span> אשר שיבוץ וסנכרן לגוגל
        </button>
    </div>

    <script>
        // שינוי קריטי: הכל עכשיו פונה לשרת המקומי שלנו!
        const API_URL = "http://localhost:8000";

        // פונקציית ההתחברות 
        function loginToGoogle() {
            window.location.href = `${API_URL}/login`;
        }

        // שליפת המשימות ממסד הנתונים
        async function fetchTasks() {
            try {
                const response = await fetch(`${API_URL}/tasks`);
                const tasks = await response.json();
                
                const listElement = document.getElementById('tasksList');
                listElement.innerHTML = ''; 

                if(tasks.length === 0) {
                    listElement.innerHTML = '<p class="text-gray-400 text-center text-sm">אין משימות כרגע. איזה כיף!</p>';
                    return;
                }

                tasks.forEach(task => {
                    const taskDiv = document.createElement('div');
                    taskDiv.className = "p-4 bg-gray-50 border border-gray-100 rounded-xl flex justify-between items-center shadow-sm";
                    taskDiv.innerHTML = `
                        <div>
                            <h3 class="font-medium text-gray-800">${task.title}</h3>
                            <p class="text-xs text-gray-500 mt-1">
                                ⚡ אנרגיה: ${task.energy_level} | ⏱️ זמן: ${task.duration_minutes} דק'
                            </p>
                            <p class="text-xs text-indigo-500 mt-1 font-medium">
                                📍 ${task.location_context !== 'Anywhere' ? task.location_context + " (" + task.estimated_transit_minutes + " דק' נסיעה)" : 'בכל מקום'}
                            </p>
                        </div>
                    `;
                    listElement.appendChild(taskDiv);
                });
            } catch (error) {
                console.error("שגיאה בשליפת המשימות:", error);
                document.getElementById('tasksList').innerHTML = '<p class="text-red-500 text-center text-sm">שגיאה בחיבור לשרת המקומי.</p>';
            }
        }

        // הוספת משימה בעזרת ג'מיני
        async function addTask() {
            const titleInput = document.getElementById('taskTitle');
            const freeText = titleInput.value;
            if (!freeText) return; 

            // פונה לכפתור ההוספה הספציפי 
            const btn = document.querySelector('button[onclick="addTask()"]');
            const originalBtnText = btn.innerHTML;
            btn.innerHTML = '🤖...';
            btn.disabled = true;

            try {
                const response = await fetch(`${API_URL}/smart_add_task`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: freeText })
                });
                
                if (response.ok) {
                    titleInput.value = ''; 
                    fetchTasks(); // מרענן את הרשימה
                } else {
                    alert('הייתה בעיה בניתוח המשימה מול השרת.');
                }
            } catch (error) {
                console.error("שגיאה בהוספת משימה:", error);
            } finally {
                btn.innerHTML = originalBtnText;
                btn.disabled = false;
            }
        }

        // השלב הבא שנעשה: הזרקת הנתונים לגוגל
        // השלב הסופי: שיבוץ חכם והזרקה לגוגל
        async function syncToGoogle() {
            const btn = document.querySelector('button[onclick="syncToGoogle()"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '⏳ מסנכרן עם גוגל...';
            btn.disabled = true;

            try {
                // 1. מריצים את אלגוריתם השיבוץ (שמוצא חורים ומחשב זמני נסיעה)
                const scheduleRes = await fetch(`${API_URL}/schedule_tasks`, { method: 'POST' });
                const scheduleData = await scheduleRes.json();
                console.log("תוצאות שיבוץ:", scheduleData);

                // 2. שולחים את מה ששובץ לתוך Google Calendar
                const syncRes = await fetch(`${API_URL}/sync_to_google`, { method: 'POST' });
                const syncData = await syncRes.json();
                
                // 3. מרעננים את המסך כדי לראות את התוצאות
                alert(syncData.message);
                window.myCalendar.refetchEvents(); // מרענן את היומן הויזואלי
                fetchTasks(); // מנקה את רשימת המשימות הממתינות
                
            } catch (error) {
                console.error("שגיאה בסנכרון:", error);
                alert("קרתה תקלה בסנכרון מול השרת.");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        // הקמת היומן ושליפת המשימות כשהדף עולה
        document.addEventListener('DOMContentLoaded', function() {
            var calendarEl = document.getElementById('calendar');
            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'timeGridWeek',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,timeGridWeek,timeGridDay'
                },
                direction: 'rtl',
                height: 'auto',
                events: `${API_URL}/api/calendar/events`
            });
            calendar.render();
            window.myCalendar = calendar; 
            
            // טוען את המשימות למטה
            fetchTasks();
        });
    </script>
</body>
</html>
